databases:
  - name: ai-workshop-db
    plan: free
    databaseName: app
    user: app

services:
  - type: web
    name: ai-workshop-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: ai-workshop-db
          property: connectionString
